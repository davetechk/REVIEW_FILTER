<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — ReviewFilter Global</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="icon" href="../assets/img/log.png" type="image/x-icon">
</head>
<body>

<div class="auth-page">
  <div class="auth-glow"></div>

  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <img src="../assets/img/logo.png" alt="ReviewFilter Global">
    </div>

    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Start protecting your reputation in minutes.</p>

    <!-- Error / success alerts -->
    <div class="alert alert-error" id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <!-- Form -->
    <div class="form-group">
      <label class="form-label" for="business-name">Business Name</label>
      <input
        type="text"
        id="business-name"
        class="form-input"
        placeholder="e.g. Bright Smile Dental"
        autocomplete="organization"
        maxlength="80"
      >
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Work Email</label>
      <input
        type="email"
        id="email"
        class="form-input"
        placeholder="you@yourbusiness.com"
        autocomplete="email"
      >
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="input-wrap">
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="Minimum 8 characters"
          autocomplete="new-password"
        >
        <button class="toggle-pw" id="toggle-pw" type="button" aria-label="Toggle password">
          👁
        </button>
      </div>
      <!-- Strength bars -->
      <div class="pw-strength" id="pw-strength">
        <div class="pw-strength-bar" id="bar-1"></div>
        <div class="pw-strength-bar" id="bar-2"></div>
        <div class="pw-strength-bar" id="bar-3"></div>
        <div class="pw-strength-bar" id="bar-4"></div>
      </div>
      <div class="pw-strength-label" id="pw-label"></div>
    </div>

    <!-- Terms -->
    <div class="checkbox-row">
      <input type="checkbox" id="terms">
      <label for="terms">
        I agree to the <a href="../terms.html">Terms of Service</a> and
        <a href="../privacy.html">Privacy Policy</a>
      </label>
    </div>

    <button class="btn-primary" id="btn-signup">
      Create Account
    </button>

    <div class="auth-divider"></div>

    <div class="auth-footer">
      Already have an account?
      <a href="login.html">Sign in</a>
    </div>

  </div>
</div>

<script type="module">
  import { supabase } from '/js/supabase.js';
  import { redirectIfLoggedIn } from '/js/auth.js';

  // redirect if already logged in
  await redirectIfLoggedIn();

  // ── DOM refs ──────────────────────────────────────────────────
  const inputBiz      = document.getElementById('business-name');
  const inputEmail    = document.getElementById('email');
  const inputPw       = document.getElementById('password');
  const togglePwBtn   = document.getElementById('toggle-pw');
  const termsCheck    = document.getElementById('terms');
  const btnSignup     = document.getElementById('btn-signup');
  const alertError    = document.getElementById('alert-error');
  const alertSuccess  = document.getElementById('alert-success');
  const pwLabel       = document.getElementById('pw-label');
  const bars          = [
    document.getElementById('bar-1'),
    document.getElementById('bar-2'),
    document.getElementById('bar-3'),
    document.getElementById('bar-4'),
  ];

  // ── TOGGLE PASSWORD VISIBILITY ────────────────────────────────
  togglePwBtn.addEventListener('click', () => {
    const isText = inputPw.type === 'text';
    inputPw.type = isText ? 'password' : 'text';
    togglePwBtn.textContent = isText ? '👁' : '🙈';
  });

  // ── PASSWORD STRENGTH ─────────────────────────────────────────
  const strengthColors = ['#ef4444','#f59e0b','#3b82f6','#10b981'];
  const strengthLabels = ['Too short','Weak','Good','Strong'];

  function getStrength(pw) {
    let score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw) && /[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    return Math.min(score, 4);
  }

  inputPw.addEventListener('input', () => {
    const pw = inputPw.value;
    if (!pw) {
      bars.forEach(b => b.style.background = '');
      pwLabel.textContent = '';
      return;
    }
    const strength = getStrength(pw);
    bars.forEach((b, i) => {
      b.style.background = i < strength ? strengthColors[strength - 1] : '';
    });
    pwLabel.textContent = strengthLabels[strength - 1] || '';
    pwLabel.style.color = strengthColors[strength - 1] || '';
  });

  // ── SHOW ALERT ────────────────────────────────────────────────
  function showError(msg) {
    alertError.textContent = msg;
    alertError.classList.add('visible');
    alertSuccess.classList.remove('visible');
  }
  function showSuccess(msg) {
    alertSuccess.textContent = msg;
    alertSuccess.classList.add('visible');
    alertError.classList.remove('visible');
  }
  function clearAlerts() {
    alertError.classList.remove('visible');
    alertSuccess.classList.remove('visible');
  }

  // ── VALIDATE ──────────────────────────────────────────────────
  function validate() {
    const biz   = inputBiz.value.trim();
    const email = inputEmail.value.trim();
    const pw    = inputPw.value;

    if (!biz)             { showError('Please enter your business name.'); inputBiz.focus(); return false; }
    if (!email)           { showError('Please enter your work email.'); inputEmail.focus(); return false; }
    if (!/\S+@\S+\.\S+/.test(email)) { showError('Please enter a valid email address.'); inputEmail.focus(); return false; }
    if (pw.length < 8)    { showError('Password must be at least 8 characters.'); inputPw.focus(); return false; }
    if (!termsCheck.checked) { showError('Please agree to the Terms of Service to continue.'); return false; }
    return true;
  }

  // ── SIGNUP ────────────────────────────────────────────────────
  btnSignup.addEventListener('click', async () => {
    clearAlerts();
    if (!validate()) return;

    const biz   = inputBiz.value.trim();
    const email = inputEmail.value.trim();
    const pw    = inputPw.value;

    // loading state
    btnSignup.disabled = true;
    btnSignup.innerHTML = '<div class="spinner"></div> Creating account…';

    const { data, error } = await supabase.auth.signUp({
      email,
      password: pw,
      options: {
        data: { business_name: biz }
      }
    });

    btnSignup.disabled = false;
    btnSignup.innerHTML = 'Create Account';

    if (error) {
      showError(error.message);
      return;
    }

    // Supabase sends a confirmation email
    showSuccess('Account created! Check your email to confirm your address, then sign in.');
    inputBiz.value = '';
    inputEmail.value = '';
    inputPw.value = '';
    termsCheck.checked = false;

    // After 3 seconds redirect to login
    setTimeout(() => {
      window.location.href = 'onboarding.html';
    }, 3000);
  });

  // Allow Enter key to submit
  [inputBiz, inputEmail, inputPw].forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') btnSignup.click();
    });
  });
</script>

</body>
</html>
