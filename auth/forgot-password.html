<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — ReviewFilter Global</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="icon" href="../assets/img/logo.png" type="image/x-icon">
  
</head>
<body>

<div class="auth-page">
  <div class="auth-glow"></div>

  <div class="auth-card">

    <div class="auth-logo">
      <img src="../assets/img/logo.png" alt="ReviewFilter Global">
    </div>

    <h1 class="auth-title">Reset your password</h1>
    <p class="auth-sub">Enter your email and we'll send you a reset link.</p>

    <div class="alert alert-error"   id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input
        type="email"
        id="email"
        class="form-input"
        placeholder="you@yourbusiness.com"
        autocomplete="email"
      >
    </div>

    <button class="btn-primary" id="btn-reset">
      Send Reset Link
    </button>

    <div class="auth-footer" style="margin-top:1.25rem;">
      <a href="login.html">← Back to sign in</a>
    </div>

  </div>
</div>

<script type="module">
  import { supabase } from '/js/supabase.js';

  const inputEmail = document.getElementById('email');
  const btnReset   = document.getElementById('btn-reset');
  const alertError = document.getElementById('alert-error');
  const alertSuccess = document.getElementById('alert-success');

  btnReset.addEventListener('click', async () => {
    const email = inputEmail.value.trim();
    alertError.classList.remove('visible');
    alertSuccess.classList.remove('visible');

    if (!email) {
      alertError.textContent = 'Please enter your email.';
      alertError.classList.add('visible');
      return;
    }

    btnReset.disabled = true;
    btnReset.innerHTML = '<div class="spinner"></div> Sending…';

    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: `${window.location.origin}/auth/reset-password.html`
    });

    btnReset.disabled = false;
    btnReset.innerHTML = 'Send Reset Link';

    if (error) {
      alertError.textContent = error.message;
      alertError.classList.add('visible');
    } else {
      alertSuccess.textContent = 'Reset link sent! Check your inbox.';
      alertSuccess.classList.add('visible');
      inputEmail.value = '';
    }
  });

  inputEmail.addEventListener('keydown', e => {
    if (e.key === 'Enter') btnReset.click();
  });
</script>

</body>
</html>
