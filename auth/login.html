<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ReviewFilter Global</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-glow"></div>

  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <img src="../assets/img/logo.png" alt="ReviewFilter Global">
    </div>


    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your ReviewFilter dashboard.</p>

    <!-- Alerts -->
    <div class="alert alert-error"   id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <!-- Form -->
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input
        type="email"
        id="email"
        class="form-input"
        placeholder="you@yourbusiness.com"
        autocomplete="email"
      >
    </div>

    <div class="form-group" style="margin-bottom: 0.5rem;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
        <label class="form-label" for="password" style="margin:0;">Password</label>
        <a href="forgot-password.html" style="font-size:0.8rem; color:var(--accent-2);">Forgot password?</a>
      </div>
      <div class="input-wrap">
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="Your password"
          autocomplete="current-password"
        >
        <button class="toggle-pw" id="toggle-pw" type="button" aria-label="Toggle password">
          👁
        </button>
      </div>
    </div>

    <div class="auth-divider"></div>

    <button class="btn-primary" id="btn-login">
      Sign In
    </button>

    <div class="auth-footer" style="margin-top:1.25rem;">
      Don't have an account?
      <a href="signup.html">Create one free</a>
    </div>

  </div>
</div>

<script type="module">
  import { supabase } from '/js/supabase.js';
  import { redirectIfLoggedIn } from '/js/auth.js';

  redirectIfLoggedIn();

  // ── DOM refs ──────────────────────────────────────────────────
  const inputEmail  = document.getElementById('email');
  const inputPw     = document.getElementById('password');
  const togglePwBtn = document.getElementById('toggle-pw');
  const btnLogin    = document.getElementById('btn-login');
  const alertError  = document.getElementById('alert-error');
  const alertSuccess= document.getElementById('alert-success');

  // ── TOGGLE PASSWORD ───────────────────────────────────────────
  togglePwBtn.addEventListener('click', () => {
    const isText = inputPw.type === 'text';
    inputPw.type = isText ? 'password' : 'text';
    togglePwBtn.textContent = isText ? '👁' : '🙈';
  });

  // ── ALERTS ────────────────────────────────────────────────────
  function showError(msg) {
    alertError.textContent = msg;
    alertError.classList.add('visible');
    alertSuccess.classList.remove('visible');
  }
  function clearAlerts() {
    alertError.classList.remove('visible');
    alertSuccess.classList.remove('visible');
  }

  // ── LOGIN ─────────────────────────────────────────────────────
  btnLogin.addEventListener('click', async () => {
    clearAlerts();

    const email = inputEmail.value.trim();
    const pw    = inputPw.value;

    if (!email) { showError('Please enter your email.'); inputEmail.focus(); return; }
    if (!pw)    { showError('Please enter your password.'); inputPw.focus(); return; }

    btnLogin.disabled = true;
    btnLogin.innerHTML = '<div class="spinner"></div> Signing in…';

    const { data, error } = await supabase.auth.signInWithPassword({ email, password: pw });

    btnLogin.disabled = false;
    btnLogin.innerHTML = 'Sign In';

    if (error) {
      // give a friendlier message than Supabase default
      if (error.message.toLowerCase().includes('invalid')) {
        showError('Incorrect email or password. Please try again.');
      } else {
        showError(error.message);
      }
      return;
    }

    // success → go to dashboard
    window.location.href = '/dashboard/index.html';
  });

  // Enter key submits
  [inputEmail, inputPw].forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') btnLogin.click();
    });
  });

  // Check if redirected after signup confirmation
  const params = new URLSearchParams(window.location.search);
  if (params.get('confirmed') === 'true') {
    alertSuccess.textContent = 'Email confirmed! You can now sign in.';
    alertSuccess.classList.add('visible');
  }
</script>

</body>
</html>
