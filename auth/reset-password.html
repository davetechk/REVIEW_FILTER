<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — ReviewFilter Global</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="icon" href="../assets/img/log.png" type="image/x-icon">
</head>
<body>

<div class="auth-page">
  <div class="auth-glow"></div>

  <div class="auth-card">

    <div class="auth-logo">
      <img src="../assets/img/logo.png" alt="ReviewFilter Global">
    </div>

    <h1 class="auth-title">Set new password</h1>
    <p class="auth-sub">Choose a strong new password for your account.</p>

    <div class="alert alert-error"   id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <div class="form-group">
      <label class="form-label" for="password">New Password</label>
      <div class="input-wrap">
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="Minimum 8 characters"
          autocomplete="new-password"
        >
        <button class="toggle-pw" id="toggle-pw" type="button" aria-label="Toggle password">👁</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="confirm-password">Confirm Password</label>
      <input
        type="password"
        id="confirm-password"
        class="form-input"
        placeholder="Repeat your new password"
        autocomplete="new-password"
      >
    </div>

    <button class="btn-primary" id="btn-reset" style="margin-top:0.5rem;">
      Set New Password
    </button>

    <div class="auth-footer" style="margin-top:1.25rem;">
      <a href="login.html">← Back to sign in</a>
    </div>

  </div>
</div>

<script type="module">
  import { supabase } from '/js/supabase.js';

  const inputPw      = document.getElementById('password');
  const inputConfirm = document.getElementById('confirm-password');
  const togglePwBtn  = document.getElementById('toggle-pw');
  const btnReset     = document.getElementById('btn-reset');
  const alertError   = document.getElementById('alert-error');
  const alertSuccess = document.getElementById('alert-success');

  // ── TOGGLE PASSWORD ───────────────────────────────────────────
  togglePwBtn.addEventListener('click', () => {
    const isText = inputPw.type === 'text';
    inputPw.type = isText ? 'password' : 'text';
    togglePwBtn.textContent = isText ? '👁' : '🙈';
  });

  // ── CHECK FOR VALID SESSION FROM EMAIL LINK ───────────────────
  // Supabase sends #access_token=...&type=recovery in the URL
  const { data: { session }, error: sessionError } = await supabase.auth.getSession();

  if (!session) {
    alertError.textContent = 'This reset link is invalid or has expired. Please request a new one.';
    alertError.classList.add('visible');
    btnReset.disabled = true;
  }

  // ── RESET PASSWORD ────────────────────────────────────────────
  btnReset.addEventListener('click', async () => {
    alertError.classList.remove('visible');
    alertSuccess.classList.remove('visible');

    const pw      = inputPw.value;
    const confirm = inputConfirm.value;

    if (pw.length < 8) {
      alertError.textContent = 'Password must be at least 8 characters.';
      alertError.classList.add('visible');
      return;
    }

    if (pw !== confirm) {
      alertError.textContent = 'Passwords do not match.';
      alertError.classList.add('visible');
      return;
    }

    btnReset.disabled = true;
    btnReset.innerHTML = '<div class="spinner"></div> Updating…';

    const { error } = await supabase.auth.updateUser({ password: pw });

    btnReset.disabled = false;
    btnReset.innerHTML = 'Set New Password';

    if (error) {
      alertError.textContent = error.message;
      alertError.classList.add('visible');
    } else {
      alertSuccess.textContent = 'Password updated successfully! Redirecting to login…';
      alertSuccess.classList.add('visible');
      setTimeout(() => {
        window.location.href = '/auth/login.html?confirmed=true';
      }, 2000);
    }
  });

  // Enter key submits
  [inputPw, inputConfirm].forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') btnReset.click();
    });
  });
</script>

</body>
</html>
