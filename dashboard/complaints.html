<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resolution Centre — ReviewFilter Global</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    /* ── RESOLUTION STATUS BADGES ── */
    .status-action  { background:rgba(239,68,68,0.12);  color:#fca5a5; border:1px solid rgba(239,68,68,0.3);  }
    .status-contacted { background:rgba(245,158,11,0.12); color:#fcd34d; border:1px solid rgba(245,158,11,0.3); }
    .status-resolved  { background:rgba(16,185,129,0.12); color:#6ee7b7; border:1px solid rgba(16,185,129,0.3); }

    /* ── COMPLAINT CARD VARIANTS ── */
    .complaint-card.action-required { border-left: 3px solid var(--red); }
    .complaint-card.contacted       { border-left: 3px solid var(--amber); }
    .complaint-card.resolved        { border-left: 3px solid var(--green); opacity: 0.75; }

    /* ── ACTION BUTTONS ── */
    .resolution-btns {
      display: flex;
      gap: 8px;
      margin-top: 0.875rem;
      flex-wrap: wrap;
    }
    .btn-resolve {
      height: 30px;
      padding: 0 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 500;
      font-family: var(--sans);
      cursor: pointer;
      border: 1px solid;
      transition: all 0.15s;
    }
    .btn-resolve:active { transform: scale(0.96); }
    .btn-contacted {
      background: rgba(245,158,11,0.1);
      color: #fcd34d;
      border-color: rgba(245,158,11,0.3);
    }
    .btn-contacted:hover { background: rgba(245,158,11,0.2); }
    .btn-resolved {
      background: rgba(16,185,129,0.1);
      color: #6ee7b7;
      border-color: rgba(16,185,129,0.3);
    }
    .btn-resolved:hover { background: rgba(16,185,129,0.2); }

    /* ── FILTER TABS ── */
    .filter-tab {
      background: var(--navy-3);
      border: 1px solid var(--border-2);
      color: var(--text-2);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 0.8125rem;
      font-family: var(--sans);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-tab:hover { border-color: rgba(255,255,255,0.2); color: var(--text-1); }
    .filter-tab.active {
      background: var(--accent-dim);
      border-color: var(--accent-bdr);
      color: var(--accent-2);
    }

    /* ── SUMMARY STRIP ── */
    .summary-strip {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .summary-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      border-radius: var(--radius);
      font-size: 0.8125rem;
      font-weight: 500;
      border: 1px solid;
    }
    .pill-action   { background:rgba(239,68,68,0.08);  color:#fca5a5; border-color:rgba(239,68,68,0.25); }
    .pill-contacted{ background:rgba(245,158,11,0.08); color:#fcd34d; border-color:rgba(245,158,11,0.25); }
    .pill-resolved { background:rgba(16,185,129,0.08); color:#6ee7b7; border-color:rgba(16,185,129,0.25); }
  </style>
</head>
<body>

<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="hamburger" id="hamburger">☰</button>
      <span class="topbar-title">Resolution Centre</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost" id="btn-mark-all"
        style="height:34px;padding:0 14px;font-size:0.8125rem;">
        Mark all contacted
      </button>
    </div>
  </div>

  <div class="page-content">

    <!-- Summary pills -->
    <div class="summary-strip">
      <div class="summary-pill pill-action">
        🔴 <span id="count-action">0</span> Action Required
      </div>
      <div class="summary-pill pill-contacted">
        🟡 <span id="count-contacted">0</span> Contacted
      </div>
      <div class="summary-pill pill-resolved">
        🟢 <span id="count-resolved">0</span> Resolved
      </div>
    </div>

    <!-- Filter tabs -->
    <div style="display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap;">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="action_required">🔴 Action Required</button>
      <button class="filter-tab" data-filter="contacted">🟡 Contacted</button>
      <button class="filter-tab" data-filter="resolved">🟢 Resolved</button>
      <button class="filter-tab" data-filter="1">1★</button>
      <button class="filter-tab" data-filter="2">2★</button>
      <button class="filter-tab" data-filter="3">3★</button>
    </div>

    <div id="complaints-list">
      <div style="text-align:center;padding:3rem;color:var(--text-3);">Loading…</div>
    </div>

  </div>
</div>

<script type="module">
  import { supabase } from '/js/supabase.js';
  import { renderSidebar, requireAuth, getProfile } from '/js/dashboard.js';

  const session = await requireAuth();
  if (!session) throw new Error('no session');
  renderSidebar('complaints');

  const profile = await getProfile();
  const bizId   = profile.id;

  let allComplaints = [];
  let activeFilter  = 'all';

  // ── LOAD ────────────────────────────────────────────────────
  async function loadComplaints() {
    const { data } = await supabase
      .from('feedback_private')
      .select('*')
      .eq('business_id', bizId)
      .order('submitted_at', { ascending: false });

    allComplaints = data || [];
    updateCounts();
    renderComplaints();
  }

  // ── COUNT SUMMARIES ─────────────────────────────────────────
  function updateCounts() {
    document.getElementById('count-action').textContent =
      allComplaints.filter(c => c.resolution_status === 'action_required' || !c.resolution_status).length;
    document.getElementById('count-contacted').textContent =
      allComplaints.filter(c => c.resolution_status === 'contacted').length;
    document.getElementById('count-resolved').textContent =
      allComplaints.filter(c => c.resolution_status === 'resolved').length;
  }

  // ── RENDER ──────────────────────────────────────────────────
  function renderComplaints() {
    const list = document.getElementById('complaints-list');
    let filtered = allComplaints;

    if (['action_required','contacted','resolved'].includes(activeFilter)) {
      filtered = allComplaints.filter(c => {
        const s = c.resolution_status || 'action_required';
        return s === activeFilter;
      });
    } else if (['1','2','3'].includes(activeFilter)) {
      filtered = allComplaints.filter(c => c.star_rating === parseInt(activeFilter));
    }

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">${activeFilter === 'action_required' ? '✅' : '🎉'}</div>
          <div class="empty-title">${activeFilter === 'action_required' ? 'No pending complaints' : 'Nothing here'}</div>
          <div class="empty-sub">${activeFilter === 'action_required' ? 'All complaints have been actioned.' : 'Nothing to show for this filter.'}</div>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(c => {
      const status = c.resolution_status || 'action_required';
      const stars  = '★'.repeat(c.star_rating) + '☆'.repeat(5 - c.star_rating);
      const date   = new Date(c.submitted_at).toLocaleDateString('en-GB', {
        day:'numeric', month:'short', year:'numeric',
        hour:'2-digit', minute:'2-digit'
      });

      const statusLabels = {
        action_required: '<span class="badge status-action">🔴 Action Required</span>',
        contacted:       '<span class="badge status-contacted">🟡 Contacted</span>',
        resolved:        '<span class="badge status-resolved">🟢 Resolved</span>',
      };

      const actionBtns = status !== 'resolved' ? `
        <div class="resolution-btns">
          ${status === 'action_required' ? `
            <button class="btn-resolve btn-contacted"
              onclick="updateStatus('${c.id}','contacted')">
              Mark as Contacted
            </button>` : ''}
          <button class="btn-resolve btn-resolved"
            onclick="updateStatus('${c.id}','resolved')">
            Mark as Resolved
          </button>
        </div>` : '';

      return `
        <div class="complaint-card ${status.replace('_','-')}" id="complaint-${c.id}">
          <div class="complaint-meta">
            <span class="complaint-name">${c.reviewer_name || 'Anonymous'}</span>
            <span class="stars" style="font-size:0.8125rem;">${stars}</span>
            ${statusLabels[status] || ''}
            <span class="complaint-time">${date}</span>
          </div>
          <div class="complaint-text">${c.complaint}</div>
          ${actionBtns}
        </div>`;
    }).join('');
  }

  // ── UPDATE STATUS ───────────────────────────────────────────
  window.updateStatus = async (id, newStatus) => {
    await supabase
      .from('feedback_private')
      .update({ resolution_status: newStatus, is_read: true })
      .eq('id', id);

    const idx = allComplaints.findIndex(c => c.id === id);
    if (idx !== -1) {
      allComplaints[idx].resolution_status = newStatus;
      allComplaints[idx].is_read = true;
    }
    updateCounts();
    renderComplaints();
  };

  // ── MARK ALL CONTACTED ──────────────────────────────────────
  document.getElementById('btn-mark-all').addEventListener('click', async () => {
    await supabase
      .from('feedback_private')
      .update({ resolution_status: 'contacted', is_read: true })
      .eq('business_id', bizId)
      .is('resolution_status', null);

    allComplaints = allComplaints.map(c => ({
      ...c,
      resolution_status: c.resolution_status || 'contacted',
      is_read: true,
    }));
    updateCounts();
    renderComplaints();
  });

  // ── FILTER TABS ─────────────────────────────────────────────
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeFilter = tab.dataset.filter;
      renderComplaints();
    });
  });

  // ── REAL-TIME NEW COMPLAINTS ────────────────────────────────
  supabase
    .channel('feedback-changes')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'feedback_private',
      filter: `business_id=eq.${bizId}`
    }, payload => {
      allComplaints.unshift(payload.new);
      updateCounts();
      renderComplaints();
    })
    .subscribe();

  loadComplaints();
</script>

</body>
</html>
